name: Refresh Docs Cache

on:
  schedule:
    - cron: "0 */6 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-cache:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh docs cache
        run: node scripts/build-cache-docs.js

      - name: Commit updated docs cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/jobs-cache.json
          git diff --cached --quiet && exit 0
          git commit -m "Refresh docs doctor jobs cache"
          git push origin main
